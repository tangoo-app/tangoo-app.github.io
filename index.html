<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tangoo</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #ffffff;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            font-size: 32px;
            margin: 0 0 35px 0;
            color: #333;
            font-weight: bold;
        }
        .ver-btn {
            display: block;
            width: 100%;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 20px;
            box-sizing: border-box;
            transition: opacity 0.1s;
        }
        .ver-btn:active {
            opacity: 0.8;
        }
        .btn-online {
            background-color: #007bff;
            color: white;
        }
        .btn-offline {
            background-color: #28a745;
            color: white;
        }
        .btn-sub {
            display: block;
            font-size: 13px;
            font-weight: normal;
            margin-top: 6px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tangoo</h1>
        
        <a href="https://tangoo-app.github.io/app/" class="ver-btn btn-online">
            通常版を開く
            <span class="btn-sub">アカウントで同期可</span>
        </a>
        
        <a href="https://tangoo-app.github.io/app-lite/" class="ver-btn btn-offline">
            軽量版を開く
            <span class="btn-sub">通信速度が遅くてもサクサク動きます。アカウント不要</span>
        </a>
    </div>

</body>
</html>
